<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せかいの こっき クイズ 🌍</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 50%, #fbbf24 100%);
    min-height: 100vh;
    padding: 16px;
    display: flex; justify-content: center; align-items: flex-start;
  }
  .app { width: 100%; max-width: 560px; }
  h1 {
    text-align: center; font-size: 28px; color: #1e3a8a;
    margin-bottom: 12px; text-shadow: 2px 2px 0 #fff;
  }
  .panel {
    background: #fff; border-radius: 24px; padding: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    border: 4px solid #1e3a8a;
  }
  .start-screen { text-align: center; }
  .start-screen p { font-size: 16px; color: #475569; margin: 8px 0 20px; }
  .mode-btn {
    display: block; width: 100%; padding: 18px;
    margin: 10px 0; border: none; border-radius: 16px;
    font-size: 20px; font-weight: bold; cursor: pointer;
    transition: transform 0.1s;
    color: #fff; font-family: inherit;
  }
  .mode-btn:active { transform: scale(0.97); }
  .mode-easy { background: #22c55e; box-shadow: 0 4px 0 #15803d; }
  .mode-normal { background: #3b82f6; box-shadow: 0 4px 0 #1d4ed8; }
  .mode-hard { background: #ef4444; box-shadow: 0 4px 0 #b91c1c; }
  .mode-desc { font-size: 13px; opacity: 0.9; margin-top: 4px; font-weight: normal; }

  .header-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; font-size: 14px; color: #475569;
  }
  .score-box { background: #1e3a8a; color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
  .streak-box { background: #f59e0b; color: #fff; padding: 6px 14px; border-radius: 20px; font-weight: bold; }
  .question { text-align: center; margin-bottom: 16px; }
  .question .label { font-size: 14px; color: #64748b; margin-bottom: 6px; }
  .question .region { display: inline-block; background: #ddd6fe; color: #5b21b6; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: bold; }
  .flag-display {
    font-size: 120px; text-align: center; line-height: 1;
    background: #f1f5f9; border-radius: 16px; padding: 20px 0; margin-bottom: 20px;
    font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
  }
  .choices { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
  .choice-btn {
    padding: 14px 10px; border: 3px solid #cbd5e1; background: #fff; border-radius: 14px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    color: #1e293b; text-align: center; transition: all 0.15s; font-family: inherit;
    min-height: 70px; display: flex; flex-direction: column; justify-content: center;
  }
  .choice-btn:hover { border-color: #3b82f6; background: #eff6ff; }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn .yomi { font-size: 12px; color: #64748b; font-weight: normal; display: block; margin-top: 2px; }
  .choice-btn.correct { background: #22c55e; color: #fff; border-color: #15803d; }
  .choice-btn.correct .yomi { color: #dcfce7; }
  .choice-btn.wrong { background: #ef4444; color: #fff; border-color: #b91c1c; }
  .choice-btn.wrong .yomi { color: #fee2e2; }
  .choice-btn:disabled { cursor: default; }

  .typing-area { text-align: center; }
  .typing-area input {
    width: 100%; padding: 14px; font-size: 18px;
    border: 3px solid #cbd5e1; border-radius: 12px;
    text-align: center; font-family: inherit;
  }
  .typing-area input:focus { outline: none; border-color: #3b82f6; }
  .hint { background: #fef3c7; padding: 10px; border-radius: 10px; margin: 12px 0; font-size: 14px; color: #92400e; }
  .submit-btn {
    background: #3b82f6; color: #fff; border: none;
    padding: 14px 28px; border-radius: 12px;
    font-size: 16px; font-weight: bold; cursor: pointer;
    margin-top: 12px; box-shadow: 0 4px 0 #1d4ed8; font-family: inherit;
  }
  .submit-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1d4ed8; }

  .feedback {
    text-align: center; padding: 16px; border-radius: 14px;
    margin-top: 16px; font-size: 18px; font-weight: bold;
    animation: pop 0.3s ease-out;
  }
  @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .feedback.ok { background: #dcfce7; color: #15803d; }
  .feedback.ng { background: #fee2e2; color: #b91c1c; }
  .feedback .answer { font-size: 24px; margin-top: 8px; }

  .map-container {
    margin-top: 12px;
    border-radius: 14px;
    overflow: hidden;
    border: 3px solid #1e3a8a;
    background: #e0f2fe;
    position: relative;
  }
  #map { width: 100%; height: 320px; }
  .map-info {
    background: #1e3a8a; color: #fff; padding: 8px 12px;
    font-size: 13px; text-align: center;
  }
  .map-tabs {
    display: flex; margin-top: 10px; gap: 6px;
  }
  .map-tab {
    flex: 1; padding: 8px; border: 2px solid #1e3a8a;
    background: #fff; color: #1e3a8a;
    border-radius: 10px; font-weight: bold; cursor: pointer;
    font-family: inherit; font-size: 13px;
  }
  .map-tab.active { background: #1e3a8a; color: #fff; }
  .map-loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.9); padding: 10px 16px;
    border-radius: 10px; font-size: 14px; color: #475569;
    z-index: 1000;
  }

  .next-btn {
    display: block; width: 100%; padding: 14px; margin-top: 12px;
    background: #1e3a8a; color: #fff; border: none;
    border-radius: 12px; font-size: 17px; font-weight: bold;
    cursor: pointer; box-shadow: 0 4px 0 #0f172a; font-family: inherit;
  }
  .next-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0f172a; }

  .quit-btn {
    display: block; width: 100%; padding: 10px; margin-top: 8px;
    background: #fff; color: #64748b; border: 2px solid #cbd5e1;
    border-radius: 10px; font-size: 14px; font-weight: bold;
    cursor: pointer; font-family: inherit;
  }
  .quit-btn:active { background: #f1f5f9; }

  .result { text-align: center; }
  .result h2 { color: #1e3a8a; font-size: 24px; margin-bottom: 12px; }
  .result .big-score { font-size: 56px; color: #f59e0b; font-weight: bold; margin: 12px 0; }
  .result .comment { font-size: 18px; color: #475569; margin-bottom: 20px; }
  .learned-list {
    background: #f8fafc; border-radius: 12px; padding: 12px;
    margin-top: 16px; max-height: 200px; overflow-y: auto;
  }
  .learned-list h3 { font-size: 14px; color: #475569; margin-bottom: 8px; }
  .learned-item {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid #e2e8f0; font-size: 14px;
  }
  .learned-item:last-child { border-bottom: none; }

  .flag-label {
    font-size: 28px; text-align: center; line-height: 1;
    text-shadow: 0 0 8px #fff, 0 0 4px #fff, 0 2px 4px rgba(0,0,0,0.3);
    background: transparent !important; border: none !important;
  }
</style>
</head>
<body>
<div class="app">
  <h1>🌍 せかいの こっき クイズ 🚩</h1>
  <div class="panel" id="panel"></div>
</div>

<script>

  { flag: '🇳🇿', name: 'ニュージーランド', yomi: 'にゅーじーらんど', region: 'オセアニア', level: 2, lat: -40.9, lng: 174.9, iso: 'NZL' },

  { flag: '🇿🇦', name: '南アフリカ',   yomi: 'みなみあふりか',   region: 'アフリカ',   level: 2, lat: -30.6, lng: 22.9, iso: 'ZAF' },
  { flag: '🇰🇪', name: 'ケニア',       yomi: 'けにあ',           region: 'アフリカ',   level: 3, lat: -0.02, lng: 37.9, iso: 'KEN' },
  { flag: '🇲🇦', name: 'モロッコ',     yomi: 'もろっこ',         region: 'アフリカ',   level: 3, lat: 31.8, lng: -7.1, iso: 'MAR' },
  { flag: '🇳🇬', name: 'ナイジェリア', yomi: 'ないじぇりあ',     region: 'アフリカ',   level: 3, lat: 9.1, lng: 8.7, iso: 'NGA' },
  { flag: '🇸🇦', name: 'サウジアラビア', yomi: 'さうじあらびあ', region: '中東',       level: 2, lat: 23.9, lng: 45.1, iso: 'SAU' },
  { flag: '🇦🇪', name: 'アラブ首長国連邦', yomi: 'あらぶしゅちょうこくれんぽう', region: '中東', level: 3, lat: 23.4, lng: 53.8, iso: 'ARE' },
  { flag: '🇮🇱', name: 'イスラエル',   yomi: 'いすらえる',       region: '中東',       level: 3, lat: 31.0, lng: 34.9, iso: 'ISR' },
  { flag: '🇮🇷', name: 'イラン',       yomi: 'いらん',           region: '中東',       level: 3, lat: 32.4, lng: 53.7, iso: 'IRN' },
];

// 世界の国境GeoJSON(一度だけ読み込み、以降キャッシュ)
let worldGeoJSON = null;
const GEOJSON_URL = 'https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';

async function loadGeoJSON() {
  if (worldGeoJSON) return worldGeoJSON;
  try {
    const res = await fetch(GEOJSON_URL);
    worldGeoJSON = await res.json();
    return worldGeoJSON;
  } catch (e) {
    console.error('GeoJSON load failed:', e);
    return null;
  }
}

// 起動時にバックグラウンドで先読み
loadGeoJSON();

let state = {
  mode: null, pool: [], current: null, choices: [],
  questionNum: 0, totalQuestions: 10,
  score: 0, streak: 0, maxStreak: 0,
  learned: [], answered: false,
};
let mapInstance = null;
const panel = document.getElementById('panel');

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showStart() {
  destroyMap();
  panel.innerHTML = `
    <div class="start-screen">
      <p>こっきを みて くにの なまえを あてよう!<br>こたえたら ちずで くにを いろで みせるよ 🗺️</p>
      <button class="mode-btn mode-easy" onclick="startGame('easy')">
        🟢 かんたん
        <div class="mode-desc">4つから えらぶ ・ ゆうめいな くに 20こ</div>
      </button>
      <button class="mode-btn mode-normal" onclick="startGame('normal')">
        🔵 ふつう
        <div class="mode-desc">6つから えらぶ ・ ぜんぶの くに</div>
      </button>
      <button class="mode-btn mode-hard" onclick="startGame('hard')">
        🔴 むずかしい
        <div class="mode-desc">なまえを にゅうりょく ・ ヒントあり</div>
      </button>
    </div>
  `;
}

function startGame(mode) {
  state.mode = mode;
  state.score = 0; state.streak = 0; state.maxStreak = 0;
  state.questionNum = 0; state.learned = [];
  state.totalQuestions = 10;
  if (mode === 'easy')      state.pool = shuffle(COUNTRIES.filter(c => c.level === 1));
  else if (mode === 'normal') state.pool = shuffle(COUNTRIES.filter(c => c.level <= 2));
  else                        state.pool = shuffle(COUNTRIES);
  nextQuestion();
}

function nextQuestion() {
  destroyMap();
  if (state.questionNum >= state.totalQuestions) { showResult(); return; }
  state.questionNum++;
  state.answered = false;
  state.current = state.pool[state.questionNum - 1] || COUNTRIES[Math.floor(Math.random()*COUNTRIES.length)];
  if (state.mode !== 'hard') {
    const numChoices = state.mode === 'easy' ? 4 : 6;
    const sameRegion = COUNTRIES.filter(c => c.region === state.current.region && c.name !== state.current.name);
    const others = COUNTRIES.filter(c => c.name !== state.current.name && c.region !== state.current.region);
    const dummies = shuffle(sameRegion).slice(0, Math.min(2, numChoices - 1))
      .concat(shuffle(others).slice(0, numChoices - 1));
    state.choices = shuffle([state.current, ...dummies.slice(0, numChoices - 1)]);
  }
  renderQuestion();
}

function renderQuestion() {
  let choicesHTML = '';
  if (state.mode === 'hard') {
    const hint = state.current.yomi.length > 3
      ? state.current.yomi[0] + '○'.repeat(state.current.yomi.length - 2) + state.current.yomi.slice(-1)
      : state.current.yomi[0] + '○'.repeat(state.current.yomi.length - 1);
    choicesHTML = `
      <div class="typing-area">
        <div class="hint">💡 ヒント: ${hint} (${state.current.yomi.length}もじ)</div>
        <input type="text" id="answerInput" placeholder="ひらがなで にゅうりょく" autocomplete="off">
        <button class="submit-btn" onclick="submitTyping()">こたえる ✏️</button>
      </div>
    `;
  } else {
    choicesHTML = `<div class="choices">` +
      state.choices.map(c => `
        <button class="choice-btn" onclick="selectAnswer('${c.name}')">
          ${c.name}
          <span class="yomi">${c.yomi}</span>
        </button>
      `).join('') + `</div>`;
  }

  panel.innerHTML = `
    <div class="header-row">
      <span>もんだい ${state.questionNum} / ${state.totalQuestions}</span>
      <span class="streak-box">🔥 ${state.streak}</span>
      <span class="score-box">⭐ ${state.score}</span>
    </div>
    <div class="question">
      <div class="label">この くにの なまえは?</div>
      <span class="region">📍 ${state.current.region}</span>
    </div>
    <div class="flag-display">${state.current.flag}</div>
    ${choicesHTML}
    <div id="feedback-area"></div>
    <button class="quit-btn" onclick="confirmQuit()">🏠 やめて さいしょに もどる</button>
  `;

  if (state.mode === 'hard') {
    const input = document.getElementById('answerInput');
    input.focus();
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitTyping(); });
  }
}

function selectAnswer(name) {
  if (state.answered) return;
  state.answered = true;
  const isCorrect = name === state.current.name;
  handleAnswer(isCorrect, name);
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    const btnName = btn.textContent.trim().split('\n')[0].trim();
    if (btnName === state.current.name) btn.classList.add('correct');
    else if (btnName === name && !isCorrect) btn.classList.add('wrong');
  });
}

function submitTyping() {
  if (state.answered) return;
  const input = document.getElementById('answerInput');
  const ans = input.value.trim();
  if (!ans) return;
  state.answered = true;
  const isCorrect = ans === state.current.yomi || ans === state.current.name;
  handleAnswer(isCorrect, ans);
  input.disabled = true;
}

function handleAnswer(isCorrect, userAnswer) {
  if (isCorrect) {
    state.score += (state.mode === 'hard' ? 20 : state.mode === 'normal' ? 15 : 10);
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    if (state.streak >= 3 && state.streak % 3 === 0) state.score += 10;
  } else {
    state.streak = 0;
  }
  state.learned.push({ ...state.current, correct: isCorrect });

  const fb = document.getElementById('feedback-area');
  fb.innerHTML = `
    <div class="feedback ${isCorrect ? 'ok' : 'ng'}">
      ${isCorrect ? '🎉 せいかい!' : '😢 ざんねん...'}
      <div class="answer">${state.current.flag} ${state.current.name} (${state.current.yomi})</div>
      ${isCorrect && state.streak >= 3 && state.streak % 3 === 0 ? '<div style="margin-top:8px;font-size:14px;">🔥 ' + state.streak + 'れんぞく! ボーナス +10</div>' : ''}
    </div>
    <div class="map-tabs">
      <button class="map-tab active" id="tab-world" onclick="switchMap('world')">🌍 せかいちず</button>
      <button class="map-tab" id="tab-zoom" onclick="switchMap('zoom')">🔍 ちかくを みる</button>
    </div>
    <div class="map-container">
      <div id="map"></div>
      <div id="map-loading" class="map-loading">ちず よみこみちゅう...</div>
      <div class="map-info">📍 ${state.current.flag} ${state.current.name} は ここに あるよ!</div>
    </div>
    <button class="next-btn" onclick="nextQuestion()">
      ${state.questionNum >= state.totalQuestions ? 'けっかを みる 🏆' : 'つぎの もんだい ➡️'}
    </button>
  `;

  setTimeout(() => initMap('world'), 100);
}

async function initMap(mode) {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  const c = state.current;
  const zoom = mode === 'world' ? 2 : 4;
  const center = mode === 'world' ? [20, c.lng] : [c.lat, c.lng];

  mapInstance = L.map('map', {
    zoomControl: true,
    attributionControl: false,
    worldCopyJump: true,
  }).setView(center, zoom);

  // 薄いベースマップ(国土の色を目立たせるため淡い色のタイル)
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
    maxZoom: 10,
    subdomains: 'abcd',
  }).addTo(mapInstance);

  // GeoJSON読み込み(キャッシュ済みなら即反映)
  const geo = await loadGeoJSON();
  const loadingEl = document.getElementById('map-loading');

  if (geo && geo.features) {
    // 正解国のポリゴンを探す(ISO_A3コードで照合)
    const countryFeature = geo.features.find(f => {
      const props = f.properties || {};
      return props.ISO_A3 === c.iso || props.iso_a3 === c.iso || props.ADM0_A3 === c.iso;
    });

    if (countryFeature) {
      // 国土を鮮やかに塗りつぶす
      const countryLayer = L.geoJSON(countryFeature, {
        style: {
          color: '#dc2626',        // 外枠:赤
          weight: 3,
          opacity: 1,
          fillColor: '#f59e0b',    // 塗り:オレンジ(目立つ)
          fillOpacity: 0.75,
        }
      }).addTo(mapInstance);

      // ズームモード時は国の境界に自動フィット
      if (mode === 'zoom') {
        mapInstance.fitBounds(countryLayer.getBounds(), { padding: [20, 20], maxZoom: 6 });
      }
    }

    if (loadingEl) loadingEl.remove();
  } else {
    // GeoJSON読み込み失敗時のフォールバック(円で表示)
    L.circle([c.lat, c.lng], {
      color: '#dc2626',
      fillColor: '#f59e0b',
      fillOpacity: 0.6,
      radius: mode === 'world' ? 500000 : 200000,
    }).addTo(mapInstance);
    if (loadingEl) loadingEl.remove();
  }

  // 国旗ラベル(中心に表示)
  const flagIcon = L.divIcon({
    className: 'flag-label',
    html: c.flag,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
  });
  L.marker([c.lat, c.lng], { icon: flagIcon, interactive: false }).addTo(mapInstance);
}

function switchMap(mode) {
  document.getElementById('tab-world').classList.toggle('active', mode === 'world');
  document.getElementById('tab-zoom').classList.toggle('active', mode === 'zoom');
  initMap(mode);
}

function destroyMap() {
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
}

function confirmQuit() {
  if (confirm('ゲームを やめて さいしょに もどりますか?')) {
    showStart();
  }
}

function showResult() {
  destroyMap();
  const max = state.totalQuestions * (state.mode === 'hard' ? 20 : state.mode === 'normal' ? 15 : 10);
  const pct = Math.round(state.score / max * 100);
  let comment, emoji;
  if (pct >= 90) { comment = 'すごい! はかせレベル!'; emoji = '🏆'; }
  else if (pct >= 70) { comment = 'よく できました!'; emoji = '🥇'; }
  else if (pct >= 50) { comment = 'がんばったね!'; emoji = '🥈'; }
  else { comment = 'もう いちど ちょうせん してみよう!'; emoji = '💪'; }

  const wrongOnes = state.learned.filter(l => !l.correct);
  const learnedHTML = wrongOnes.length > 0 ? `
    <div class="learned-list">
      <h3>📚 おぼえようリスト (まちがえた くに)</h3>
      ${wrongOnes.map(l => `
        <div class="learned-item">
          <span>${l.flag} ${l.name}</span>
          <span style="color:#64748b;">${l.yomi}</span>
        </div>
      `).join('')}
    </div>
  ` : '<div class="learned-list"><h3>🌟 ぜんぶ せいかい! すごい!</h3></div>';

  panel.innerHTML = `
    <div class="result">
      <h2>${emoji} けっか はっぴょう!</h2>
      <div class="big-score">${state.score}てん</div>
      <div class="comment">${comment}</div>
      <div style="background:#f1f5f9;padding:12px;border-radius:12px;margin:12px 0;">
        🔥 さいだい れんぞく せいかい: <b>${state.maxStreak}かい</b>
      </div>
      ${learnedHTML}
      <button class="next-btn" onclick="showStart()" style="margin-top:20px;">
        🏠 さいしょに もどる
      </button>
    </div>
  `;
}

showStart();
</script>
</body>
</html>
